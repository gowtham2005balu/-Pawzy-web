<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Mongo</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chewy&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="screen-container" style="min-height: 1088px; height: auto; display: flex; flex-direction: column; position: relative; background-color: #f4f9f7;">
        <!-- HTML Navbar removed to use React Navbar -->

        <!-- React Mount Point for Blog content -->
        <div id="root" style="flex: 1; display: flex; flex-direction: column;"></div>

    </div>

    <!-- Mount React Component -->
    <script type="module">
        import React from 'react'
        import ReactDOM from 'react-dom/client'
        import Blog from './src/Blog.jsx'
        import './src/index.css'

        ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(React.StrictMode, null,
                React.createElement(Blog)
            )
        )
    </script>

    <!-- Perfect scaling script that maintains full width and correctly expands height -->
    <script>
        function resizeToFit() {
            const container = document.querySelector('.screen-container');
            if (!container) return;
            const scale = window.innerWidth / 1920;
            container.style.transform = `scale(${scale})`;
            document.body.style.height = `${container.offsetHeight * scale}px`;
        }
        window.addEventListener('resize', resizeToFit);
        
        const observer = new ResizeObserver(resizeToFit);
        const container = document.querySelector('.screen-container');
        if (container) observer.observe(container);
        
        resizeToFit();
    </script>
</body>
</html>
